<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Opções de Ícone — DRE Raiz 2.0</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f1f5f9; font-family: 'Segoe UI', sans-serif; padding: 40px 24px; }
    h1 { text-align: center; color: #1e293b; font-size: 22px; margin-bottom: 6px; }
    p.sub { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 36px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px; max-width: 1100px; margin: 0 auto; }

    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      cursor: pointer;
      border: 2px solid transparent;
      transition: all .2s;
    }
    .card:hover { border-color: #1B75BB; box-shadow: 0 6px 24px rgba(27,117,187,.18); transform: translateY(-2px); }
    .card.selected { border-color: #1B75BB; background: #eff6ff; }

    .num { font-size: 11px; font-weight: 800; color: #94a3b8; letter-spacing: 2px; text-transform: uppercase; }
    .name { font-size: 14px; font-weight: 700; color: #1e293b; }
    .desc { font-size: 11px; color: #64748b; text-align: center; line-height: 1.5; }

    /* Tamanhos de preview */
    .previews { display: flex; align-items: flex-end; gap: 12px; }
    .preview-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .preview-wrap span { font-size: 9px; color: #94a3b8; }

    svg { display: block; }

    .btn-escolher {
      margin-top: 4px;
      padding: 6px 18px;
      border-radius: 8px;
      border: none;
      background: #1B75BB;
      color: white;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-escolher:hover { background: #155fa0; }
    .card.selected .btn-escolher { background: #16a34a; }

    #resultado {
      max-width: 1100px;
      margin: 32px auto 0;
      padding: 20px 24px;
      background: #1B75BB;
      color: white;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      display: none;
    }
  </style>
</head>

let selecionado = null;

  card.innerHTML = `
    <span class="num">Opção ${op.num}</span>
    <div class="previews">
      <div class="preview-wrap">${op.svg32}<span>favicon</span></div>
      <div class="preview-wrap">${op.svg64}<span>64px</span></div>
      <div class="preview-wrap">${op.svg128}<span>128px</span></div>
    </div>
    <span class="name">${op.name}</span>
    <span class="desc">${op.desc}</span>
    <button class="btn-escolher" onclick="escolher(${op.num}, event)">Escolher esta</button>
  `;
  grid.appendChild(card);
});

function escolher(num, e) {
  e.stopPropagation();
  if (selecionado) document.getElementById(`card-${selecionado}`)?.classList.remove('selected');
  selecionado = num;
  document.getElementById(`card-${num}`).classList.add('selected');
  const op = opcoes.find(o => o.num === num);
  const res = document.getElementById('resultado');
  res.style.display = 'block';
  res.innerHTML = `✅ Você escolheu a <strong>Opção ${num} — ${op.name}</strong>. Me diga aqui e implemento como favicon do app!`;
  res.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
