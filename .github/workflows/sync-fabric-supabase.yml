name: Sync Fabric → Supabase

on:
  schedule:
    - cron: '0 12 * * *'   # 09:00 BRT (UTC-3) todos os dias
  workflow_dispatch:        # permite disparar manualmente pelo GitHub

jobs:
  sync:
    name: Sincronização Fabric → dre_fabric
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar ODBC Driver 18 para SQL Server
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -qq
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências Python
        run: pip install -r requirements.txt requests

      - name: Executar sincronização
        run: python "scripts/Sincronizacao_manual_banco.py"

      - name: Salvar log de erros (se houver)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: erros-sincronizacao-${{ github.run_id }}
          path: erros_sincronizacao_*.json
          if-no-files-found: ignore
          retention-days: 30
